<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coach Login — VYAYAM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { background: #0a0e27; color: #fff; font-family: 'Inter', sans-serif;
      display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { background: #1a1f3a; border-radius: 20px; padding: 40px 36px;
      max-width: 400px; width: 100%; border: 1px solid rgba(255,255,255,.08); }
    .brand { font-size: 1.6rem; font-weight: 800; text-align: center; margin-bottom: 4px;
      background: linear-gradient(135deg,#667eea,#764ba2);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .brand-sub { text-align: center; font-size: .82rem; opacity: .5; margin-bottom: 28px; text-transform: uppercase; letter-spacing: 1px; }
    .form-label { font-size: .82rem; font-weight: 600; opacity: .7; margin-bottom: 6px; display: block; }
    .form-input { width: 100%; background: #0d1117; border: 1px solid rgba(255,255,255,.12);
      border-radius: 10px; padding: 11px 16px; color: #fff; font-size: .9rem; margin-bottom: 16px; }
    .form-input:focus { outline: none; border-color: #667eea; }
    .submit-btn { width: 100%; padding: 13px; background: linear-gradient(135deg,#667eea,#764ba2);
      border: none; border-radius: 12px; color: #fff; font-weight: 700; font-size: .95rem; cursor: pointer; }
    .error-box { background: rgba(239,68,68,.15); border: 1px solid rgba(239,68,68,.3);
      border-radius: 10px; padding: 12px 16px; font-size: .84rem; color: #fca5a5; margin-bottom: 16px; }
    .patient-link { text-align: center; margin-top: 20px; font-size: .8rem; opacity: .5; }
    .patient-link a { color: #667eea; text-decoration: none; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="brand">⚽ VYAYAM</div>
    <div class="brand-sub">Coach / Therapist Login</div>
    {% if error %}
    <div class="error-box"><i class="fas fa-exclamation-circle me-2"></i>{{ error }}</div>
    {% endif %}
    <form method="POST">
      {% csrf_token %}
      <label class="form-label">Username</label>
      <input type="text" name="username" class="form-input" placeholder="coach username" autocomplete="username" autofocus>
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-input" placeholder="••••••••" autocomplete="current-password">
      <button type="submit" class="submit-btn">Sign In →</button>
    </form>
    <div class="patient-link">
      Patient? <a href="{% url 'patient_login' %}">Patient login</a>
    </div>
  </div>
</body>
</html>
