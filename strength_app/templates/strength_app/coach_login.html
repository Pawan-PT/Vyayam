<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coach Login — VYAYAM</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: linear-gradient(135deg, #f4f7f5 0%, #e8f0ea 100%);
      color: #1a1c1c; display: flex; align-items: center;
      justify-content: center; min-height: 100vh;
    }
    .login-wrap { width: 100%; max-width: 400px; padding: 20px; }
    .login-box {
      background: #fff; border-radius: 20px; padding: 38px 34px;
      border: 1px solid rgba(26,28,28,.08);
      box-shadow: 0 8px 32px rgba(26,28,28,.10);
    }
    .brand {
      font-size: 1.6rem; font-weight: 800; text-align: center; margin-bottom: 4px;
      background: linear-gradient(135deg, #0c6c3f, #6bbf8a);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .brand-sub {
      text-align: center; font-size: .78rem; color: #3d4f42; opacity: .65;
      margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px;
    }
    .therapist-badge {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      background: rgba(12,108,63,.1); border: 1px solid rgba(12,108,63,.2);
      color: #0c6c3f; border-radius: 20px;
      font-size: .72rem; font-weight: 700; padding: 5px 14px;
      margin: 0 auto 26px; width: fit-content;
    }
    .form-label { font-size: .82rem; font-weight: 600; color: #3d4f42; margin-bottom: 6px; display: block; }
    .form-input {
      width: 100%; background: #f4f7f5; border: 1px solid rgba(26,28,28,.14);
      border-radius: 10px; padding: 11px 16px; color: #1a1c1c; font-size: .9rem; margin-bottom: 16px;
      font-family: inherit;
    }
    .form-input:focus { outline: none; border-color: #0c6c3f; background: #fff; }
    .form-input::placeholder { color: #3d4f42; opacity: .5; }
    .submit-btn {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #0c6c3f, #6bbf8a);
      border: none; border-radius: 12px; color: #fff; font-weight: 700;
      font-size: .95rem; cursor: pointer; font-family: inherit;
      box-shadow: 0 4px 16px rgba(12,108,63,.25);
    }
    .submit-btn:hover { opacity: .92; }
    .error-box {
      background: rgba(186,26,26,.08); border: 1px solid rgba(186,26,26,.25);
      border-radius: 10px; padding: 11px 15px; font-size: .84rem; color: #ba1a1a; margin-bottom: 16px;
    }
    .patient-link { text-align: center; margin-top: 20px; font-size: .8rem; color: #3d4f42; }
    .patient-link a { color: #0c6c3f; text-decoration: none; font-weight: 600; }
    .patient-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-box">
      <div class="brand"><i class="fas fa-dumbbell me-1"></i> VYAYAM</div>
      <div class="brand-sub">Coach / Therapist Login</div>
      <div class="therapist-badge"><i class="fas fa-stethoscope"></i> Therapist Dashboard Access</div>

      {% if error %}
      <div class="error-box"><i class="fas fa-exclamation-circle me-2"></i>{{ error }}</div>
      {% endif %}

      <form method="POST">
        {% csrf_token %}
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-input" placeholder="coach username" autocomplete="username" autofocus>
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-input" placeholder="••••••••" autocomplete="current-password">
        <button type="submit" class="submit-btn"><i class="fas fa-sign-in-alt me-2"></i>Sign In</button>
      </form>
      <div class="patient-link">
        Patient? <a href="{% url 'patient_login' %}">Patient login →</a>
      </div>
    </div>
  </div>
</body>
</html>
